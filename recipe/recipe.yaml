schema_version: 1

context:
  name: cbor2
  version: "6.1.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cbor2-${{ version }}.tar.gz
  sha256: 6f0644869e0fdcd6f3874330b8f1cebd009f33191de43acf609dc2409cd362c4

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cbor2=cbor2.tool:main

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - setuptools >=77
    - setuptools-scm >=6.4
    - tomli
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cbor2
      pip_check: true
  - script:
      - cbor2 --help

about:
  summary: CBOR (de)serializer with extensive tag support
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/agronholm/cbor2
  documentation: https://cbor2.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
