schema_version: 1

context:
  name: cbor2
  version: "6.1.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cbor2-${{ version }}.tar.gz
  sha256: 6b43037a66947dee5af0abb1a4c3a13b3abac5a4a3f32f9771efbbcd030fd909

build:
  number: 0
  script:
    - cd rust && cargo-bundle-licenses --format yaml --output ../THIRDPARTY.yml && cd ..
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cbor2=cbor2.tool:main

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - setuptools >=77
    - setuptools-scm >=6.4
    - setuptools-rust
    - tomli
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cbor2
      pip_check: true
  - script:
      - cbor2 --help

about:
  summary: CBOR (de)serializer with extensive tag support
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  homepage: https://github.com/agronholm/cbor2
  documentation: https://cbor2.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
